name: Daily Sentiment Data Update

on:
  schedule:
    - cron: '16 17 * * 1-5'  # 5:16 PM UTC (after US market close) Mon-Fri
  workflow_dispatch:

jobs:
  update-sentiment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright pandas
      
      - name: Fetch sentiment data
        run: python scripts/fetch_sentiment_data.py
      
      - name: Commit & push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          git add data/sentiment_cache.json
          git commit -m "🔄 Auto: Update sentiment data - $(date -u +'%Y-%m-%d %H:%M')" || true
          git push
